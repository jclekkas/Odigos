name: Smoke Test (Scheduled)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke Test — odigosauto.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        env:
          BASE_URL: "https://odigosauto.com"
        run: npx tsx scripts/smoke-test.ts
