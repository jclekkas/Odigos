name: Remove Replit Dependencies
on:
  workflow_dispatch:
jobs:
  fix-replit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create fix script
        run: |
          cat > fix-replit-deps.mjs << 'SCRIPT'
          import fs from 'fs';

          // 1. Fix payments.ts - line-by-line replacement of REPLIT_DOMAINS
          const paymentsPath = 'server/routes/payments.ts';
          const pLines = fs.readFileSync(paymentsPath, 'utf8').split('\n');
          const pOut = [];
          let pi = 0;
          while (pi < pLines.length) {
            if (pLines[pi].includes('const baseUrl = process.env.REPLIT_DOMAINS')) {
              const indent = pLines[pi].match(/^(\s*)/)[1];
              pOut.push(indent + 'const baseUrl = process.env.VITE_SITE_URL');
              pi++;
              pOut.push(indent + '  ? process.env.VITE_SITE_URL.replace(/\\\\/$/, "")');
              pi++;
              pOut.push(indent + '  : "https://www.odigosauto.com";');
              pi++;
            } else {
              pOut.push(pLines[pi]);
              pi++;
            }
          }
          fs.writeFileSync(paymentsPath, pOut.join('\n'));
          console.log('payments.ts: fixed REPLIT_DOMAINS ->  VITE_SITE_URL');

          // 2. Fix alerts.ts - simple string replace
          const alertsPath = 'server/alerts.ts';
          let alerts = fs.readFileSync(alertsPath, 'utf8');
          alerts = alerts.replace(
            'const REPLIT_DB_URL = process.env.REPLIT_DB_URL;',
            'const REPLIT_DB_URL: string | undefined = undefined; // Removed Replit KV — in-memory state on Vercel'
          );
          fs.writeFileSync(alertsPath, alerts);
          console.log('alerts.ts: fixed REPLIT_DB_URL');

          // 3. Fix vite.config.ts - line-by-line removal
          const vitePath = 'vite.config.ts';
          const vLines = fs.readFileSync(vitePath, 'utf8').split('\n');
          const vOut = [];
          let skip = false;
          for (const line of vLines) {
            if (line.includes('import runtimeErrorOverlay')) continue;
            if (line.trim().startsWith('runtimeErrorOverlay()')) continue;
            if (line.includes('process.env.REPL_ID')) { skip = true; continue; }
            if (skip) {
              if (line.includes(': []),')) { skip = false; continue; }
              continue;
            }
            vOut.push(line);
          }
          fs.writeFileSync(vitePath, vOut.join('\n'));
          console.log('vite.config.ts: removed Replit plugins');
          SCRIPT
      - name: Run fix script
        run: node fix-replit-deps.mjs
      - name: Verify no REPLIT references remain in key files
        run: |
          echo "Checking payments.ts..."
          ! grep -n "REPLIT_DOMAINS" server/routes/payments.ts || (echo "FAIL: REPLIT_DOMAINS still present" && exit 1)
          echo "Checking alerts.ts for active REPLIT_DB_URL..."
          ! grep -n "process.env.REPLIT_DB_URL" server/alerts.ts || (echo "FAIL: process.env.REPLIT_DB_URL still present" && exit 1)
          echo "Checking vite.config.ts..."
          ! grep -n "REPL_ID" vite.config.ts || (echo "FAIL: REPL_ID still present" && exit 1)
          echo "All checks passed!"
      - name: Cleanup
        run: |
          rm -f fix-replit-deps.mjs
          rm -f .github/workflows/remove-replit-deps.yml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: remove Replit-specific dependencies for Vercel deployment"
          git push
