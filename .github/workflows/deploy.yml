name: Deploy to Replit

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Replit Autoscale Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        env:
          REPLIT_DEPLOY_WEBHOOK: ${{ secrets.REPLIT_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$REPLIT_DEPLOY_WEBHOOK" ]; then
            echo "::warning::REPLIT_DEPLOY_WEBHOOK secret is not set — skipping deploy."
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt..."
            if curl -fsS -X POST "$REPLIT_DEPLOY_WEBHOOK" --max-time 30; then
              echo "Deploy triggered successfully."
              exit 0
            fi
            echo "Attempt $attempt failed."
            [ "$attempt" -lt 3 ] && sleep 5
          done

          echo "::error::All 3 deploy attempts failed."
          exit 1
