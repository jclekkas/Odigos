name: CI

# Run on every pull request and every push to main.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: Install → Typecheck → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        # Node version read from .nvmrc (value: 20).
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # ── 1. Install ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 2. Lint ───────────────────────────────────────────────────────────────
      # Runs ESLint and fails CI on any error-level lint violations.
      # Warnings (no-console, no-explicit-any) are reported but do not block CI
      # to avoid surfacing pre-existing issues unrelated to this hardening task.
      - name: Lint
        run: npm run lint

      # ── 3. Typecheck ─────────────────────────────────────────────────────────
      - name: Typecheck
        run: npm run check

      # ── 4. Tests (unit + api + components) ──────────────────────────────────
      # Runs all three Vitest projects in one command.
      #
      # No PostgreSQL service container is needed: all database and external API
      # calls (OpenAI, Stripe, pg) are fully mocked via vi.mock() in each test
      # file. vitest.config.ts sets DATABASE_URL to a dummy value so no real
      # connection is attempted.
      #
      # Playwright E2E tests are intentionally excluded from required CI:
      #   - They require a fully running dev server on port 3000.
      #   - Playwright browser installation adds significant runtime to every PR.
      #   - All external API calls are intercepted via page.route(), but server
      #     startup and Chromium setup still make E2E slow and flaky in CI.
      #   - E2E can be added as a separate optional or scheduled workflow later.
      - name: Run tests
        run: npx vitest run --coverage

      # ── 4. Build ─────────────────────────────────────────────────────────────
      # The CI=true env var (set automatically by GitHub Actions) causes
      # script/build.ts to skip the prerender step, which requires a Nix-specific
      # Chromium binary unavailable on GitHub-hosted runners.
      #
      # Required env vars for build:
      #   DATABASE_URL     — required by server/db.ts at module load time.
      #                      No real DB connection is made during a build; any
      #                      valid-looking URL is sufficient.
      #   VITE_POSTHOG_KEY / VITE_POSTHOG_HOST / VITE_SITE_URL — Vite embeds
      #                      VITE_-prefixed vars at build time. Empty strings are
      #                      fine; PostHog is analytics-only and not required to
      #                      compile.
      #
      # No GitHub Secrets are required for this workflow. All sensitive runtime
      # credentials (OPENAI_API_KEY, STRIPE_SECRET_KEY, SESSION_SECRET) are only
      # read at server startup, not at build time.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          VITE_POSTHOG_KEY: ""
          VITE_POSTHOG_HOST: ""
          VITE_SITE_URL: ""

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      NODE_ENV: test
      SESSION_SECRET: "ci-dummy-secret"
      OPENAI_API_KEY: "sk-dummy-openai-key"
      STRIPE_SECRET_KEY: "sk_test_dummy_stripe_key"
      VITE_POSTHOG_KEY: ""
      VITE_POSTHOG_HOST: ""
      VITE_SITE_URL: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run schema migration
        run: npm run db:push -- --force

      - name: Start production server
        run: npm start &

      - name: Wait for server to be ready
        run: curl --retry 20 --retry-connrefused --retry-delay 3 --fail http://localhost:3000/api/health

      - name: Run Playwright E2E tests
        run: npx playwright test
